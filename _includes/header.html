<!-- meta information -->
<meta charset="utf-8">
<meta name="description" {% if page.title == "Home" %}
      content="{{ site.data.other.description }}" {% else %}
      content="{{ page.content | strip_html | strip_newlines | truncate: 120 }}" {% endif %}>
<meta name="author" content="{{ site.data.other.author }}">

<!-- Enable responsiveness on mobile devices-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<!-- title -->
<title>{{ page.title }} &middot; {{ site.data.other.name }}</title>

<!-- icons -->
<link rel="shortcut icon" href="{{ site.baseurl }}/public/img/favicon.ico" />

<!-- stylesheets -->
<link rel="stylesheet" href="{{ site.baseur l}}/public/css/responsive.gs.12col.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/animate.min.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/main.css">

{% if site.paginate %}
<!-- font Awesome -->
<link href="//maxcdn.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">
{% endif %}

<!-- feed links -->
<link rel="alternate" href="{{ site.baseurl }}/feed.xml" type="application/rss+xml" title="{{ site.name }}">
{% feed_meta %}
