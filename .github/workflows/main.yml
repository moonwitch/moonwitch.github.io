name: github pages

on:
  push:
    branches:
      - main  # Set a branch to deploy
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v2.4.0
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # Modern Hugo transpiles SCSS with Dart Sass (libsass is deprecated).
      # peaceiris/actions-hugo does not bundle it, so install the standalone
      # binary and put it on PATH. Pinned for reproducible builds.
      - name: Install Dart Sass
        env:
          DART_SASS_VERSION: 1.83.4
        run: |
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" | tar -xz
          echo "${PWD}/dart-sass" >> "$GITHUB_PATH"

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          
          
