name: github pages

on:
  push:
    branches:
      - main  # Set a branch to deploy
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v2.4.0
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          # Pinned to a known-good version. Using 'latest' previously broke the
          # build when Hugo removed deprecated features (resources.ToCSS, lang
          # front matter). Bump deliberately after testing locally.
          hugo-version: '0.163.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          
          
