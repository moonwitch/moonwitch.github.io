######################## default configuration ####################
baseURL: https://kellyand.coffee/
title: Kelly and Coffee
locale: en-US
defaultContentLanguage: en
enableEmoji: true
summaryLength: 10
enableGitInfo: true # Change 'Lastmod' to latest git commit
removePathAccents: true # Because I may type accents

#################### Pagination ####################
pagination:
  pagerSize: 6

#################### Analytics ####################
# GA4 is wired through Hugo's internal template, which reads the ID from here.
services:
  googleAnalytics:
    ID: G-WYTPMHCV3B

# theme: hugo-theme-loumans

#################### Navigation ####################
# sectionPagesMenu: "main"
menu:
  main:
    - name: Tech
      url: /dev/
      weight: 1
    - name: Advocacy
      url: /audhd/
      weight: 2
    - name: Blog
      url: /posts/
      weight: 3
    - name: About
      url: /about/
      weight: 4

#################### Taxonomies;grouping ####################
# Must include default tags and categories
taxonomies:
  category: categories
  tag: tags

#################### default parameters ################################
params:
  logo: images/header2.png
  home: Home
  description: >-
    Notes from a neurodivergent, queer DevOps engineer on tech, accessibility, and living as your whole self.
  subtitle: Neurodivergent · LGBTQIA+ · Tech advocate
  author: Kelly Crabbé
  heroTitle: Automation by day. Advocacy out loud.
  heroLede: >-
    I'm Kelly — a DevOps & automation engineer who also writes and speaks about being AuDHD and queer in tech. Two sides of the same person. Pick a door.
  avatar: true
  bio: >-
    I am a geeky, happily married, neurodivergent and queer woman who works in DevOps after a 15-year affair with system administration. I write about tech, accessibility, and showing up as my whole self — alongside my wife, our plus-daughter, and a very particular English Cocker Spaniel named Lou.
  mobile: +32479695560
  email: kelly@kellyand.coffee
  location: "Neerlinter,België"
  copyright: >-
    | copyright &copy; 2022 [Kelly Crabbé](https://kellyand.coffee)
    All Rights Reserved |
  preloader:
    enable: true
    preloader: ""
  search:
    enable: true
  social:
    - title: facebook
      link: "https://facebook.com/kaymoonwitch"
    - title: twitter
      link: "https://twitter.com/kaymoonwitch"
    - title: instagram
      link: "https://instagram.com/kaymoonwitch"
    - title: github
      link: "https://github.com/moonwitch"
    - title: linkedin
      link: "https://www.linkedin.com/in/kellycrabbe"
    - title: 500px
      link: https://500px.com/p/kellycrabbe
    - title: deviantart
      link: https://www.deviantart.com/kay-moonwitch
  comments:
    provider: giscus
    commentable:
      page: true
      post: true
      docs: false
      project: false
      publication: true
      talk: false
    giscus:
      repo: moonwitch/moonwitch.github.io
      repo_id: R_kgDOGiHVbw
      category: Announcements
      category_id: DIC_kwDOGiHVb84CAgCM
      mapping: pathname
      input_position: top
      metadata_enabled: 0
      reactions_enabled: 1
      label: comment
      theme: light
