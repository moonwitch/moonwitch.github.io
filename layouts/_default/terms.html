{{ partial "header.html" . }}
<section class="page-wrap">
  <header class="page-head">
    <h1 class="page-head__title" data-reveal>{{ .Title }}</h1>
  </header>
  <ul class="tag-list" data-reveal>
    {{ $data := .Data }}
    {{ range $key, $value := .Data.Terms.ByCount }}
      <li><a class="tag" href="{{ printf "/%s/%s" $data.Plural ($value.Name | urlize) | relLangURL }}">#{{ $value.Name }} ({{ $value.Count }})</a></li>
    {{ end }}
  </ul>
</section>
{{ partial "footer.html" . }}
