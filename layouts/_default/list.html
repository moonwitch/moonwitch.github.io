{{ define "main" }}
<div class="page-wrap">
  <header class="page-head">
    <h1 class="page-head__title" data-reveal>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-head__desc" data-reveal>{{ . }}</p>{{ end }}
  </header>

  {{ $paginator := .Paginate (where .Pages "Type" "posts") }}
  {{ partial "post-grid.html" $paginator }}
</div>
{{ end }}
