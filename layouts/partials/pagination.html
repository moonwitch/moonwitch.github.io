{{- /* Prev/next pager. Receives a paginator. */ -}}
<nav class="c-pagination p-pagination" aria-label="Pagination">
  <div class="c-pagination__ctrl">
    <div class="c-pagination__newer">
      {{ if .HasPrev }}<a href="{{ .Prev.URL }}" rel="prev">Newer</a>{{ end }}
    </div>
    <div class="c-pagination__older">
      {{ if .HasNext }}<a href="{{ .Next.URL }}" rel="next">Older</a>{{ end }}
    </div>
  </div>
  <span class="c-pagination__count p-pagination__count">Page {{ .PageNumber }} of {{ .TotalPages }}</span>
</nav>
