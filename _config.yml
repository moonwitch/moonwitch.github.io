# SITE CONFIGURATION
baseurl:            ""
url:                "http://kellyc.eu"
reading_time:       true
words_per_minute:   200
email:              kelly.crabbe@gmail.com

# THEME-SPECIFIC CONFIGURATION
title:              Kelly C.
description:        "My own little nook on the interwebz where I discuss a multitude of topics in my own life."
avatar:             assets/img/triangle.png
favicon:            assets/favicon.ico

# Header and footer text
header_text: "Life as it is"
header_feature_image: assets/img/pexels/triangular.jpeg
footer_text: >
  Powered by <a href="https://jekyllrb.com/">Jekyll</a> with <a href="https://github.com/sylhare/Type-on-Strap">Type on Strap</a> as base.

# Blog
excerpt: truncate
post_navigation: true
color_image: /assets/img/lineart.png                    # A bit transparent for color posts.

# Features
katex: false # Math Markup
google_analytics: UA-150465502-1
disqus_shortname: moonwitch
layout_variables:                                       # Open the "_sass > base" folder, and open "_variables.scss"
footer_icons:                                           # In _data/social.yml
share_buttons:                                          # In _data/social.yml
authors:                                                # In _data/authors.yml
language:                                               # In _data/language.yml

# PAGINATION
paginate: 5
paginate_path: "blog/page:num"

# PORTFOLIO
collections:
  portfolio:
    output: true
    permalink: /:collection/:name

# BUILD SETTINGS
markdown: kramdown
kramdown:
  auto_ids:         true
  footnote_nr:      1
  entity_output:    as_char
  toc_levels:       1..6
  enable_coderay:   false
mathjax:            true
highlighter: rouge
sass:
  sass_dir: _sass
  style: :compressed
plugins: [jekyll-paginate, jekyll-seo-tag, jekyll-feed]
exclude: [".jekyll-cache", "Gemfile", "Gemfile.lock", "type-on-strap.gemspec", "*.gem", ".idea", "vendor/*",
          "LICENSE", "README.md", "screenshot.png", "assets/package.json", "assets/node_modules", "assets/gulpfile.js"]

# PROSE SETTINGS
prose:
  rooturl: '_posts'
  siteurl: "https://kellyc.eu"
  media: /assets/img/posts
  ignore:
    - index.md
    - _config.yml
    - /_layouts
    - /_includes
  metadata:
    etadata:
    _posts:
      - name: "layout"
        field:
          element: "hidden"
          value: "blog"
      - name: "tags"
        field:
          element: "multiselect"
          label: "Add Tags"
          placeholder: "Choose Tags"
          options:
            - name: "Apples"
              value: "apples"
            - name: "Bananas"
              value: "bananas"
      - name: "image"
        field:
          element: "text"
          label: "Add Image to Post"
          placeholder: "Image path (relative to /assets/post-images/)"
          alterable: true
