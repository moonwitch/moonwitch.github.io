name: Kelly Crabbé
description: Some random description should be given.
url: http://other-net.com
baseurl: '' # does not include hostname

# Location of things
source:       .
destination:  ./_site
layouts:      ./_layouts
data_source:  ./_data

# Handling of
include:      ['.htaccess']
keep_files:   ['.git','.svn']
exclude:      ['mainsite.*','CNAME']
markdown_ext: 'markdown,mkd,md'
encoding:     'utf-8'

# Conversions
markdown:     kramdown
highlighter:  pygments
excerpt_separator: "\n\n"

# Filtering Content
future:       true
show_drafts:  nil
limit_posts:  0

# Backwards Compat
relative_permalinks: true

# Output
permalink:     date
paginate_path: 'page:num'
paginate:      5

# GH Plugins
gems:
- jekyll-mentions
- jemoji
- jekyll-redirect-from
- jekyll-sitemap

# Markdown Processors
kramdown:
  input: GFM

# CSS Preprocessors
sass:
  sass_dir: public/css
  style: nested
